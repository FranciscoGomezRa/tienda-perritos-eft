name: CI/CD Tienda Perritos EKS

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  # Nombres de los repositorios de ECR (no son secretos)
  ECR_REPO_FRONTEND: tienda-frontend
  ECR_REPO_BACKEND: tienda-backend
  ECR_REPO_DB: tienda-db

jobs:
  # ========== ETAPA DE TEST (requisito EFT: build → test → push → deploy) ==========
  # Corre ANTES del build/deploy y sin secrets: los tests unitarios del backend
  # (jest + supertest) mockean la BD, por lo que no necesitan infraestructura.
  # Si un test falla, el job de despliegue NI SIQUIERA parte (needs: test).
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias (npm ci)
        run: npm ci

      - name: Ejecutar tests unitarios
        run: npm test

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    # Los secrets (AWS + BD) viven en el Environment 'production'.
    # Solo se exponen a este job porque lo declara explícitamente.
    environment: production

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # ========== BUILD DE IMÁGENES (sin push todavía) ==========
      # Doble tag por imagen: SHA corto del commit (trazabilidad) + latest.
      - name: Build FRONTEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} -t $ECR_REGISTRY/${ECR_REPO_FRONTEND}:latest ./frontend

      - name: Build BACKEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG} -t $ECR_REGISTRY/${ECR_REPO_BACKEND}:latest ./backend

      - name: Build DB
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/${ECR_REPO_DB}:${IMAGE_TAG} -t $ECR_REGISTRY/${ECR_REPO_DB}:latest ./db

      # ========== ESCANEO DE VULNERABILIDADES (Trivy) ==========
      # Requisito EFT de seguridad básica: escanear las imágenes ANTES de publicarlas.
      # exit-code 0 = informativo (no bloquea el deploy); severidades altas quedan en el log.
      - name: Escaneo Trivy FRONTEND
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/tienda-frontend:latest
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Escaneo Trivy BACKEND
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/tienda-backend:latest
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Escaneo Trivy DB
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/tienda-db:latest
          severity: HIGH,CRITICAL
          exit-code: '0'

      # ========== PUSH A ECR ==========
      - name: Push imágenes a ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          for repo in $ECR_REPO_FRONTEND $ECR_REPO_BACKEND $ECR_REPO_DB; do
            docker push $ECR_REGISTRY/$repo:${IMAGE_TAG}
            docker push $ECR_REGISTRY/$repo:latest
          done

      # ========== KUBECTL + KUBECONFIG ==========
      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configurar kubeconfig para EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"
          kubectl config current-context

      # ========== NAMESPACE ==========
      - name: Aplicar namespace
        run: kubectl apply -f k8s/namespace.yaml

      # ========== SECRET DE MYSQL (generado desde GitHub Secrets) ==========
      # No se versiona ninguna contraseña: el Secret se crea aquí a partir del
      # secret 'MYSQL_ROOT_PASSWORD' del Environment.
      - name: Crear/actualizar Secret de MySQL
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          kubectl create secret generic mysql-secret \
            --from-literal=MYSQL_ROOT_PASSWORD="$MYSQL_ROOT_PASSWORD" \
            -n "$EKS_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -

      # ========== BASE DE DATOS ==========
      - name: Desplegar BASE DE DATOS (MySQL) en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/mysql-deployment.yaml -n "$EKS_NAMESPACE"
          kubectl apply -f k8s/mysql-service.yaml -n "$EKS_NAMESPACE"
          kubectl set image deployment/tienda-db \
            mysql=$ECR_REGISTRY/${ECR_REPO_DB}:${IMAGE_TAG} \
            -n "$EKS_NAMESPACE"
          kubectl rollout status deployment/tienda-db -n "$EKS_NAMESPACE"

      # ========== BACKEND ==========
      - name: Desplegar BACKEND en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/backend-deployment.yaml -n "$EKS_NAMESPACE"
          kubectl apply -f k8s/backend-service.yaml -n "$EKS_NAMESPACE"
          kubectl set image deployment/tienda-backend \
            backend=$ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG} \
            -n "$EKS_NAMESPACE"
          kubectl rollout status deployment/tienda-backend -n "$EKS_NAMESPACE"

      # ========== FRONTEND ==========
      - name: Desplegar FRONTEND en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/frontend-deployment.yaml -n "$EKS_NAMESPACE"
          kubectl apply -f k8s/frontend-service.yaml -n "$EKS_NAMESPACE"
          kubectl set image deployment/tienda-frontend \
            frontend=$ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} \
            -n "$EKS_NAMESPACE"
          kubectl rollout status deployment/tienda-frontend -n "$EKS_NAMESPACE"

      # ========== METRICS SERVER (necesario para el HPA) ==========
      # El Metrics Server se provee como COMPLEMENTO gestionado del clúster EKS
      # (habilitado en el wizard de creación). NO se instala el manifiesto de
      # upstream (components.yaml) porque su Service usa el selector 'k8s-app',
      # que al hacer 'apply' se fusionaba con el Service del complemento (cuyos
      # pods usan 'app.kubernetes.io/name') dejando el selector con un AND
      # imposible -> MissingEndpoints -> Metrics API caída -> HPA en <unknown>.
      # Aquí solo verificamos que la Metrics API esté disponible.
      - name: Verificar Metrics Server (para HPA)
        run: |
          kubectl get apiservices v1beta1.metrics.k8s.io
          kubectl wait --for=condition=Available --timeout=120s \
            apiservices/v1beta1.metrics.k8s.io || true

      # ========== AUTOSCALING (HPA) ==========
      - name: Aplicar HPA
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          if [ -f k8s/backend-hpa.yaml ]; then kubectl apply -f k8s/backend-hpa.yaml -n "$EKS_NAMESPACE"; fi
          if [ -f k8s/frontend-hpa.yaml ]; then kubectl apply -f k8s/frontend-hpa.yaml -n "$EKS_NAMESPACE"; fi

      # ========== ESTADO FINAL ==========
      - name: Ver pods, servicios y HPA
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl get pods -n "$EKS_NAMESPACE" -o wide
          kubectl get svc -n "$EKS_NAMESPACE"
          kubectl get hpa -n "$EKS_NAMESPACE" || true
